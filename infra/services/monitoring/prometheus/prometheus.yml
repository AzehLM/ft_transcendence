global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: caddy
    static_configs:
      - targets: ["caddy:2019"] # scrape Caddy metrics directly via admin API, so we won't have to expose the /metrics route
