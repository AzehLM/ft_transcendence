# Persistence — RDB (Redis Database) snapshot + AOF (Append Only File) for durability
# https://redis.io/docs/latest/operate/oss_and_stack/management/persistence/
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Memory limit — 256MB is plenty for refresh tokens + pub/sub
maxmemory 256mb
# Least Recently Used are deleted first
maxmemory-policy allkeys-lru

# Disable dangerous commands in prod-like environments
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command CONFIG   ""
rename-command DEBUG    ""
rename-command KEYS     ""
