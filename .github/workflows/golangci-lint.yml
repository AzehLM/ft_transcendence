name: golangci-lint
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --help  # no-op: prevents the action from running golangci-lint run
      - name: lint
        run: make lint-back
