name: golangci-lint
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [storage, auth, orga, shared]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --help  # no-op: prevents the action from running golangci-lint run
      - name: lint
        run: make lint-${{ matrix.service }}
